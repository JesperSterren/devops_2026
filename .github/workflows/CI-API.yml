name: API Unit Tests & Coverage

on:
  push:
    # Runt alleen als er wijzigingen zijn in de api map
    paths:
      - 'api/**'
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  jest-tests:
    runs-on: ubuntu-latest
    
    # Dit zorgt dat alle 'run' commando's standaard in de /api folder starten
    defaults:
      run:
        working-directory: ./api

    permissions:
      checks: write
      pull-requests: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # De cache moet weten waar de package-lock.json staat
          cache-dependency-path: ./api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Jest & Coverage Report
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Omdat 'defaults' niet werkt voor 'uses', stellen we het hier handmatig in
          working-directory: ./api
          # Een mooie threshold van 80% (instelbaar naar wens)
          threshold: 80
          # Optioneel: specificeer je test script
          test-script: npm test
